<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>JoanX — Prototype</title>
<link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg?v=3">
<style>
  html, body { height: 100%; background: #0a1f6b; }
  body {
    background-image: url("/assets/backgrounds/page-bg.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
  }
  #root { height: 100%; }
  .stage { min-height: 100%; display: flex; flex-direction: column; align-items: center; padding: 22px 16px 40px; gap: 18px; }

  /* iOS frame */
  .bezel { width: 390px; height: 844px; border-radius: 56px; background: #0b0b10;
    padding: 12px; box-shadow: 0 40px 80px rgba(46,43,41,.28), 0 0 0 2px #1c1c24; position: relative; flex-shrink: 0; }
  .screen { width: 100%; height: 100%; border-radius: 46px; overflow: hidden; background: #fff; position: relative; }
  .island { position: absolute; top: 22px; left: 50%; transform: translateX(-50%); width: 122px; height: 34px;
    background: #000; border-radius: 999px; z-index: 90; }
  .home-ind { position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px;
    border-radius: 999px; background: rgba(0,0,0,.32); z-index: 95; }

  .play-wrap { filter: saturate(1); }
  .play-calm { filter: saturate(.82); }
  .play-max  { filter: saturate(1.18); }
  .jx-nofun .game-font { font-family: var(--font-sans) !important; letter-spacing: -0.3px; font-weight: 800; }
  .jx-still .jx-float { animation: none !important; }
  @keyframes jxSheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .jx-sheet-up { animation: jxSheetUp .28s cubic-bezier(.22,.61,.36,1); }
  @keyframes jxPop { from { opacity: 0; transform: scale(.86); } to { opacity: 1; transform: scale(1); } }
  .jx-pop { animation: jxPop .5s ease both; }
  @keyframes jxScan { from { top: 26px; } to { top: 208px; } }
  .jx-scan { animation: jxScan 1.7s ease-in-out infinite alternate; }
  @keyframes jxShake { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-7px)} 40%,60%{transform:translateX(7px)} }
  .jx-shake { animation: jxShake .5s cubic-bezier(.36,.07,.19,.97) both; }

  /* control bar */
  .topbar { display: flex; align-items: center; gap: 10px; }
  .seg { display: inline-flex; background: #fff; border-radius: 999px; padding: 4px; box-shadow: 0 4px 16px rgba(46,43,41,.12); }
  .seg button { border: none; background: transparent; font-family: inherit; font-size: 13.5px; font-weight: 700; color: #585450; padding: 8px 18px; border-radius: 999px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .seg button.on { background: #447aaf; color: #fff; }
  .gear { width: 42px; height: 42px; border-radius: 999px; background: #fff; border: none; box-shadow: 0 4px 16px rgba(46,43,41,.14); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }

  /* tweaks panel */
  .tweaks { position: fixed; top: 18px; right: 18px; width: 264px; background: #fff; border-radius: 22px; box-shadow: 0 24px 60px rgba(46,43,41,.26); padding: 16px; z-index: 200; max-height: calc(100vh - 36px); overflow-y: auto; }
  .tweaks h4 { margin: 0; font-size: 16px; font-weight: 800; }
  .tw-label { font-size: 11px; font-weight: 800; color: #585450; text-transform: uppercase; letter-spacing: .4px; margin: 16px 0 8px; }
  .tw-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tw-chip { border: 1.5px solid #ebebea; background: #fff; font-family: inherit; font-size: 12.5px; font-weight: 700; color: #2b2926; padding: 7px 12px; border-radius: 11px; cursor: pointer; }
  .tw-chip.on { background: #ecf3fe; border-color: #447aaf; color: #2b5782; }
  .tw-sw { width: 30px; height: 30px; border-radius: 999px; cursor: pointer; border: 3px solid #fff; box-shadow: 0 0 0 1.5px #ebebea; }
  .tw-sw.on { box-shadow: 0 0 0 2.5px #2b2926; }
  @media (min-width: 721px) { .stage.with-panel { padding-right: 16px; } }
  @media (max-width: 720px) { .tweaks { position: static; width: 390px; margin: 0 auto; max-height: none; } .stage.with-panel { padding-right: 16px; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
